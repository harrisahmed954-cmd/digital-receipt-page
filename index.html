<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Get Your Digital Receipt</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 40px 30px;
      text-align: center;
      max-width: 380px;
      width: 90%;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    .icon { font-size: 48px; margin-bottom: 16px; }
    h1 { font-size: 22px; color: #222; margin-bottom: 8px; }
    p { font-size: 14px; color: #666; margin-bottom: 28px; line-height: 1.5; }
    #google-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: white;
      border: 2px solid #ddd;
      border-radius: 8px;
      padding: 14px 20px;
      font-size: 16px;
      color: #333;
      cursor: pointer;
      width: 100%;
      transition: background 0.2s;
    }
    #google-btn:hover { background: #f9f9f9; }
    #google-btn img { width: 24px; height: 24px; }
    #success {
      display: none;
      background: #e8f5e9;
      border-radius: 12px;
      padding: 20px;
      color: #2e7d32;
    }
    #success h2 { font-size: 20px; margin-bottom: 8px; }
    #success p { color: #388e3c; margin: 0; }
    #loading { display: none; color: #666; font-size: 14px; margin-top: 16px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🧾</div>
    <h1>Get Your Digital Receipt</h1>
    <p>Skip the paper. Sign in with Google and we'll email your receipt automatically.</p>

    <button id="google-btn" onclick="signInWithGoogle()">
      <img src="https://www.google.com/favicon.ico" alt="Google"/>
      Continue with Google
    </button>

    <div id="loading">Sending your receipt...</div>

    <div id="success">
      <h2>✅ You're all set!</h2>
      <p>Your receipt will arrive in your inbox shortly.</p>
    </div>
  </div>

  <script>
    const WEBHOOK_URL = "https://n8n.srv1530322.hstgr.cloud/webhook/digital-receipt";
    const CLIENT_ID = "6763860426-8cspf79ka3j9tn654p5lmo74h8tdlaan.apps.googleusercontent.com";
    const REDIRECT_URI = "https://digital-receipt-page.vercel.app";

    function signInWithGoogle() {
      const params = new URLSearchParams({
        client_id: CLIENT_ID,
        redirect_uri: REDIRECT_URI,
        response_type: "token id_token",
        scope: "email profile",
        prompt: "select_account",
        nonce: Math.random().toString(36).substring(2)
      });
      window.location.href = "https://accounts.google.com/o/oauth2/v2/auth?" + params.toString();
    }

    function parseJwt(token) {
      const base64 = token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/');
      return JSON.parse(atob(base64));
    }

    function handleRedirect() {
      const hash = window.location.hash.substring(1);
      const params = new URLSearchParams(hash);
      const idToken = params.get("id_token");

      if (idToken) {
        const data = parseJwt(idToken);
        document.getElementById("google-btn").style.display = "none";
        document.getElementById("loading").style.display = "block";

        fetch(WEBHOOK_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            email: data.email,
            name: data.name,
            store_id: "store_001",
            cashier_id: "cashier_01"
          })
        }).then(() => {
          document.getElementById("loading").style.display = "none";
          document.getElementById("success").style.display = "block";
          history.replaceState(null, null, " ");
        });
      }
    }

    window.onload = handleRedirect;
  </script>
</body>
</html>
